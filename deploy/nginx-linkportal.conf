# LinkPortal - nginx site config
# Install:
#   sudo cp deploy/nginx-linkportal.conf /etc/nginx/sites-available/linkportal
#   sudo ln -s /etc/nginx/sites-available/linkportal /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Serves the built React frontend (frontend/dist) and proxies /api to the Node
# backend on loopback. Replace linkportal.example.com and the cert paths.

# Redirect all plain HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name linkportal.example.com;
    return 301 https://$host$request_uri;
}

server {
    # Note: "listen ... ssl http2" works on all current nginx versions. On nginx
    # 1.25.1+ you may instead use "listen 443 ssl;" together with "http2 on;".
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name linkportal.example.com;

    # --- TLS ---
    ssl_certificate     /etc/ssl/linkportal/fullchain.pem;
    ssl_certificate_key /etc/ssl/linkportal/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # --- Built frontend (static files) ---
    root  /opt/linkportal/frontend/dist;
    index index.html;

    # Basic security headers.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options        SAMEORIGIN always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;

    # Room for link logo/image payloads.
    client_max_body_size 5m;

    # API -> Node backend on loopback. The trailing-slash-less proxy_pass keeps the
    # original /api/... path, which is what the Express routes expect.
    location /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Cache hashed build assets aggressively (filenames change on every build).
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback so React Router client-side routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
