# LinkPortal - nginx site for skzdev02 (behind Tailscale Serve).
#
# Tailscale terminates TLS for  https://skzdev02.tail898daf.ts.net/  (port 443)
# and proxies to this server over loopback. nginx therefore listens on PLAIN HTTP
# on 127.0.0.1 only and must never be exposed outside the host.
#
# Local ports used by LinkPortal (kept clear of the todo app on 9121):
#   127.0.0.1:8090  nginx (this file)      <- Tailscale Serve target
#   127.0.0.1:4010  Node backend (systemd) <- /api proxy target
#
# Install:
#   sudo cp deploy/skzdev02/nginx-linkportal.conf /etc/nginx/sites-available/linkportal
#   sudo ln -s /etc/nginx/sites-available/linkportal /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then point Tailscale Serve at it (see tailscale-serve.sh):
#   sudo tailscale serve --bg --https=443 http://127.0.0.1:8090

server {
    listen 127.0.0.1:8090;
    server_name skzdev02.tail898daf.ts.net;

    # Built React frontend (static files).
    root  /opt/linkportal/frontend/dist;
    index index.html;

    # Security headers. TLS/HSTS itself is handled by Tailscale Serve.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options        SAMEORIGIN always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;

    # Room for link logo/image payloads.
    client_max_body_size 5m;

    # --- API -> Node backend on loopback ---
    location /api/ {
        proxy_pass         http://127.0.0.1:4010;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # External scheme is always HTTPS (Tailscale terminates TLS upstream).
        proxy_set_header   X-Forwarded-Proto https;
    }

    # --- Self-hosted Chrome/Edge extension (CRX + update manifest) ---
    # Served unauthenticated over the tailnet so the browser updater can poll it.
    location /ext/ {
        alias /opt/linkportal/extension-dist/;
        autoindex off;
        default_type application/octet-stream;
        types {
            text/xml                        xml;
            application/x-chrome-extension  crx;
        }
        add_header Cache-Control "no-cache";
    }

    # Cache hashed build assets aggressively (filenames change on every build).
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback so React Router deep links resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
