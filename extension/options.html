<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
    <style>
      body { width: 420px; max-height: none; padding: 16px; }
      h1 { font-size: 16px; color: var(--rs-primary-dark); margin: 0 0 4px; }
      .ok { color: var(--rs-primary-dark); font-size: 12px; }
    </style>
    <title>LinkPortal – Settings</title>
  </head>
  <body>
    <h1>🔗 LinkPortal – Settings</h1>
    <p class="muted">Connect the extension to your LinkPortal server.</p>

    <div class="login-view" style="padding: 0;">
      <label>Server URL</label>
      <input id="baseUrl" type="text" placeholder="http://localhost:4000" />

      <div id="loggedOut">
        <label>Username</label>
        <input id="user" type="text" autocomplete="username" />
        <label>Password</label>
        <input id="pass" type="password" autocomplete="current-password" />
        <button id="loginBtn" class="primary">Sign in</button>
      </div>

      <div id="loggedIn" class="hidden">
        <p class="ok" id="loggedInMsg"></p>
        <button id="logoutBtn" class="primary" style="background: var(--danger);">Sign out</button>
      </div>

      <div id="msg" class="error"></div>
    </div>

    <hr style="margin: 16px 0; border: none; border-top: 1px solid var(--border);" />
    <h1 style="font-size: 14px;">🔔 Notifications</h1>
    <p class="muted">Get a desktop notification when new links are added to the catalog.</p>
    <div class="login-view" style="padding: 0;">
      <label class="check-row" style="display: flex; align-items: center; gap: 8px;">
        <input id="notifyEnabled" type="checkbox" style="width: auto;" />
        Notify me when new links are added
      </label>
      <label>Check interval (minutes)</label>
      <input id="notifyInterval" type="number" min="1" max="120" />
      <p class="ok" id="notifySaved"></p>
    </div>

    <script type="module" src="options.js"></script>
  </body>
</html>
